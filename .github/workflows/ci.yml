name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - name: Verify dbt sources mirror the contract
        run: diff contracts/dbt_sources.yml dbt/sources/tfl.yml
      - run: uv run task lint
      - run: uv run task test
      - run: uv run bandit -r src contracts scripts --severity-level high
      - run: uv run task dbt-parse
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm --dir web install --frozen-lockfile
      - run: pnpm --dir web lint
      - run: pnpm --dir web test
      - run: pnpm --dir web build
      - name: Verify OpenAPI TS types match the spec
        run: |
          pnpm --dir web exec openapi-typescript ../contracts/openapi.yaml -o /tmp/types.ts
          diff /tmp/types.ts web/lib/types.ts
