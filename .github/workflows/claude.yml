name: Claude Code

on:
  # Interactive @claude only. Automatic PR review is handled by CodeRabbit +
  # Copilot (which post visible output); Claude runs on demand when you mention
  # @claude in a PR or issue comment. The dedicated claude-code-review.yml
  # auto-review was removed — it was redundant with CodeRabbit/Copilot and
  # stayed silent on trivial diffs.
  #
  # pull_request_review / pull_request_review_comment are deliberately omitted:
  # non-collaborator GitHub Apps (e.g. Copilot) gate those events as
  # `action_required` (manual-approval) so they never run; @claude in a normal
  # PR/issue comment works via issue_comment below.
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

concurrency:
  group: claude-${{ github.workflow }}-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude:
    name: Claude (interactive @claude mention)
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --model claude-opus-4-7
