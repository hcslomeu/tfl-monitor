name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
      - "web/**"
      - "contracts/**"
      - "dbt/**"
      - "tests/**"
      - "infra/**"
      - "scripts/**"

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are reviewing a pull request for the tfl-monitor portfolio project.
            Follow the principles in CLAUDE.md strictly. Be concise, specific, and
            actionable. Only flag issues that genuinely matter.

            Focus areas (in priority order):
            1. Bugs and logic errors that would break runtime behavior.
            2. Security issues: hardcoded secrets, SQL injection, missing input
               validation, permissive CORS, unsafe deserialization.
            3. Adherence to CLAUDE.md: DRY/KISS/YAGNI, no over-engineering, no
               unnecessary abstractions, one tool per job.
            4. Test coverage gaps for new logic.
            5. Type safety: missing type hints (Python), missing types (TS).

            Do NOT comment on:
            - Pure style preferences already enforced by Ruff/Biome.
            - Hypothetical "what if" scenarios with no concrete risk.
            - Documentation tone or wording.

            Post inline comments where possible. End with a short top-level
            summary: APPROVE / REQUEST_CHANGES / COMMENT and one-paragraph reasoning.
          claude_args: |
            --model claude-haiku-4-5
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
