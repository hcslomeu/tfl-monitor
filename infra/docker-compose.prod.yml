# Production compose stack — deployed to /opt/tfl-monitor/ on the shared
# Lightsail box (eu-west-2). Single service: api. Ingestion (producers,
# consumers) and the message broker were removed in ADR 014 — the app reads
# TfL live on demand. The dbt seed + dim_stations build runs one-shot from
# scripts/deploy.sh (post-healthcheck) via `docker exec` in the api container.
#
# The api container joins the host-wide `caddy_net` so the shared Caddy
# at /opt/caddy/ can reverse-proxy `tfl-monitor-api.humbertolomeu.com` to
# `tfl-monitor-api-1:8000`.

services:
  api:
    build:
      context: ..
      dockerfile: src/api/Dockerfile
    container_name: tfl-monitor-api-1
    restart: unless-stopped
    env_file: ../.env
    networks:
      - caddy_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      # 120s keeps the API still self-monitored but cuts the /health hit
      # rate to 1/4 of the previous 30s tick — every hit is a Logfire span
      # via instrument_fastapi, so this is pure ingest-volume reduction.
      interval: 120s
      timeout: 5s
      retries: 3

networks:
  caddy_net:
    external: true
