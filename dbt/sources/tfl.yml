version: 2

sources:
  - name: tfl
    description: "Raw Kafka-backed event streams for the TfL warehouse."
    database: "{{ env_var('POSTGRES_DB', 'tflmonitor') }}"
    schema: raw
    tables:
      - name: line_status
        description: "Append-only snapshots of TfL line operational status."
        columns:
          - name: event_id
            description: "Unique event identifier (UUIDv7)."
            tests:
              - not_null
              - unique
          - name: ingested_at
            description: "UTC timestamp when the event landed in the warehouse."
            tests:
              - not_null
          - name: event_type
            tests:
              - not_null
          - name: source
            tests:
              - not_null
          - name: payload
            description: "Full JSON envelope from Kafka."
            tests:
              - not_null

      - name: arrivals
        description: "Append-only stream of predicted vehicle arrivals at stop points."
        columns:
          - name: event_id
            tests:
              - not_null
              - unique
          - name: ingested_at
            tests:
              - not_null
          - name: event_type
            tests:
              - not_null
          - name: source
            tests:
              - not_null
          - name: payload
            tests:
              - not_null

      - name: disruptions
        description: "Append-only stream of reported disruptions across the network."
        columns:
          - name: event_id
            tests:
              - not_null
              - unique
          - name: ingested_at
            tests:
              - not_null
          - name: event_type
            tests:
              - not_null
          - name: source
            tests:
              - not_null
          - name: payload
            tests:
              - not_null

  # Static reference tables live in the `ref` schema, not `raw`. dbt only
  # honours `schema` at the source level (not per-table), so these need
  # their own source block rather than a per-table override under `tfl`.
  - name: tfl_ref
    description: "Static reference tables (lines, stations) loaded into the ref schema by CSV seeds / batch jobs."
    database: "{{ env_var('POSTGRES_DB', 'tflmonitor') }}"
    schema: ref
    tables:
      - name: lines
        description: "Canonical list of TfL lines with display metadata."
        columns:
          - name: line_id
            tests:
              - not_null
              - unique
          - name: line_name
            tests:
              - not_null
          - name: mode
            tests:
              - not_null

      - name: stations
        description: "Canonical list of TfL stop points with coordinates."
        columns:
          - name: station_id
            tests:
              - not_null
              - unique
          - name: station_name
            tests:
              - not_null
