openapi: 3.1.0
info:
  title: tfl-monitor API
  version: 0.0.1
  description: |
    Public HTTP surface for the tfl-monitor platform.

    - Live line status and disruptions are read through to the TfL Unified
      API on demand (ADR 014 — no warehouse history).
    - Conversational endpoints route to a LangGraph agent with live TfL and RAG tools.

    CORS allowlist (production) covers the dashboard origins only
    (`https://tfl-monitor.vercel.app`, `http://localhost:3000`). Never `*`.
    Error responses use RFC 7807 `application/problem+json`.

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.tfl-monitor.example
    description: Production

tags:
  - name: health
  - name: status
  - name: disruptions
  - name: chat

paths:
  /health:
    get:
      tags: [health]
      operationId: get_health
      summary: Service liveness probe
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok
                dependencies: {}

  /api/v1/status/live:
    get:
      tags: [status]
      operationId: get_status_live
      summary: Current operational status for every served line
      responses:
        "200":
          description: Live line statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LineStatus"
              example:
                - line_id: victoria
                  line_name: Victoria
                  mode: tube
                  status_severity: 10
                  status_severity_description: Good Service
                  reason: null
                  valid_from: "2026-04-22T07:00:00Z"
                  valid_to: "2026-04-22T23:59:59Z"
                - line_id: piccadilly
                  line_name: Piccadilly
                  mode: tube
                  status_severity: 6
                  status_severity_description: Severe Delays
                  reason: "Signal failure at Acton Town"
                  valid_from: "2026-04-22T06:15:00Z"
                  valid_to: "2026-04-22T23:59:59Z"
                - line_id: elizabeth
                  line_name: Elizabeth line
                  mode: elizabeth-line
                  status_severity: 9
                  status_severity_description: Minor Delays
                  reason: "Earlier incident at Paddington"
                  valid_from: "2026-04-22T05:30:00Z"
                  valid_to: "2026-04-22T23:59:59Z"
        "500":
          $ref: "#/components/responses/Problem"

  /api/v1/disruptions/recent:
    get:
      tags: [disruptions]
      operationId: get_recent_disruptions
      summary: Most recent disruptions, optionally scoped to a mode
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: mode
          schema:
            type: string
            enum: [tube, elizabeth-line, overground, dlr, bus, national-rail, river-bus, cable-car, tram]
      responses:
        "200":
          description: Recent disruptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Disruption"
              example:
                - disruption_id: "2026-04-22-PIC-001"
                  category: RealTime
                  category_description: Real Time
                  description: "Signal failure at Acton Town, reduced service on Piccadilly."
                  summary: "Severe delays on Piccadilly line"
                  affected_routes: [piccadilly]
                  affected_stops:
                    - { naptan_id: "940GZZLUACT", name: "Acton Town" }
                    - { naptan_id: "940GZZLUBSC", name: "Barons Court" }
                  closure_text: ""
                  severity: 6
                  created: "2026-04-22T06:15:00Z"
                  last_update: "2026-04-22T08:05:00Z"
                - disruption_id: "2026-04-22-ELI-001"
                  category: RealTime
                  category_description: Real Time
                  description: "Earlier incident at Paddington affecting Elizabeth line."
                  summary: "Minor delays on Elizabeth line"
                  affected_routes: [elizabeth]
                  affected_stops:
                    - { naptan_id: "910GPADTON", name: "Paddington" }
                  closure_text: ""
                  severity: 6
                  created: "2026-04-22T05:40:00Z"
                  last_update: "2026-04-22T07:20:00Z"
                - disruption_id: "2026-04-21-VIC-001"
                  category: PlannedWork
                  category_description: Planned Work
                  description: "Engineering works affecting Victoria line weekend service."
                  summary: "Minor delays this weekend"
                  affected_routes: [victoria]
                  affected_stops: []
                  closure_text: "No service between Seven Sisters and Walthamstow Central on Sunday."
                  severity: 9
                  created: "2026-04-18T12:00:00Z"
                  last_update: "2026-04-21T09:00:00Z"
                - disruption_id: "2026-04-22-PIC-002"
                  category: Information
                  category_description: Information
                  description: "Lifts out of service at Holborn."
                  summary: "Step-free access affected"
                  affected_routes: [piccadilly]
                  affected_stops:
                    - { naptan_id: "940GZZLUHBN", name: "Holborn" }
                  closure_text: ""
                  severity: 9
                  created: "2026-04-22T04:00:00Z"
                  last_update: "2026-04-22T04:00:00Z"
                - disruption_id: "2026-04-22-VIC-002"
                  category: Information
                  category_description: Information
                  description: "Reduced frequency during morning peak due to staff shortage."
                  summary: "Change of frequency on Victoria line"
                  affected_routes: [victoria]
                  affected_stops: []
                  closure_text: ""
                  severity: 9
                  created: "2026-04-22T06:30:00Z"
                  last_update: "2026-04-22T07:45:00Z"
        "500":
          $ref: "#/components/responses/Problem"

  /api/v1/chat/stream:
    post:
      tags: [chat]
      operationId: post_chat_stream
      summary: Stream an agent response over SSE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE frames. Each `data:` frame contains a JSON payload of the
                  shape `{"type": <str>, "content": <str>}`. Frame types:
                  `token` (streamed assistant text), `tool` (a tool invocation,
                  content is the tool name), `journey` / `arrivals` (structured
                  cards whose `content` is a JSON-encoded `JourneyView` /
                  `ArrivalsView`), and `end` (terminator; content is `"error"`
                  on failure, else empty).
        "400":
          $ref: "#/components/responses/Problem"
        "500":
          $ref: "#/components/responses/Problem"

  /api/v1/chat/{thread_id}/history:
    get:
      tags: [chat]
      operationId: get_chat_history
      summary: Retrieve messages for an existing chat thread
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
              example:
                - role: user
                  content: "Is the Piccadilly line running normally right now?"
                  created_at: "2026-04-20T14:12:00Z"
                - role: assistant
                  content: "Yes — the Piccadilly line is reporting Good Service at the moment."
                  created_at: "2026-04-20T14:12:04Z"
        "404":
          $ref: "#/components/responses/Problem"
        "500":
          $ref: "#/components/responses/Problem"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status, dependencies]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum: [ok, degraded, unreachable]

    LineStatus:
      type: object
      required:
        - line_id
        - line_name
        - mode
        - status_severity
        - status_severity_description
        - valid_from
        - valid_to
      properties:
        line_id: { type: string }
        line_name: { type: string }
        mode:
          type: string
          enum: [tube, elizabeth-line, overground, dlr, bus, national-rail, river-bus, cable-car, tram]
        status_severity:
          type: integer
          minimum: 0
          maximum: 20
        status_severity_description: { type: string }
        reason:
          type: [string, "null"]
        valid_from: { type: string, format: date-time }
        valid_to: { type: string, format: date-time }

    Disruption:
      type: object
      required:
        - disruption_id
        - category
        - category_description
        - description
        - summary
        - affected_routes
        - affected_stops
        - closure_text
        - severity
        - created
        - last_update
      properties:
        disruption_id: { type: string }
        category:
          type: string
          enum: [RealTime, PlannedWork, Information, Incident, Undefined]
        category_description: { type: string }
        description: { type: string }
        summary: { type: string }
        affected_routes:
          type: array
          items: { type: string }
        affected_stops:
          type: array
          items:
            $ref: "#/components/schemas/AffectedStop"
        closure_text: { type: string }
        severity:
          type: integer
          minimum: 0
        created: { type: string, format: date-time }
        last_update: { type: string, format: date-time }

    AffectedStop:
      type: object
      description: |
        NaPTAN code resolved to a human-readable station name when
        possible. ``name`` is ``null`` when neither the static
        dim_stations seed nor the TfL /StopPoint fallback could match
        the code (e.g. deprecated NaPTANs); the frontend renders the
        raw ``naptan_id`` in that case.
      required: [naptan_id]
      properties:
        naptan_id: { type: string }
        name:
          type: string
          nullable: true

    ChatRequest:
      type: object
      required: [thread_id, message]
      properties:
        thread_id: { type: string }
        message: { type: string, minLength: 1, maxLength: 4000 }

    ChatMessage:
      type: object
      required: [role, content, created_at]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content: { type: string }
        created_at: { type: string, format: date-time }

    JourneyLeg:
      type: object
      description: One leg of a planned journey.
      required: [mode, summary, minutes]
      properties:
        mode: { type: string }
        summary: { type: string }
        minutes: { type: integer, minimum: 0 }

    JourneyView:
      type: object
      description: |
        Structured payload of a `journey` SSE frame (the `content` field is
        this object JSON-encoded). Built from `plan_journey_tool`.
      required: [total_minutes, start, arrival, legs]
      properties:
        total_minutes: { type: integer, minimum: 0 }
        start: { type: string }
        arrival: { type: string }
        legs:
          type: array
          items: { $ref: "#/components/schemas/JourneyLeg" }

    ArrivalPrediction:
      type: object
      description: One predicted arrival at a platform.
      required: [line, seconds]
      properties:
        line: { type: string }
        destination: { type: string, nullable: true }
        seconds: { type: integer, minimum: 0 }

    ArrivalsPlatform:
      type: object
      description: Upcoming arrivals grouped under a single platform.
      required: [platform, arrivals]
      properties:
        platform: { type: string }
        arrivals:
          type: array
          items: { $ref: "#/components/schemas/ArrivalPrediction" }

    ArrivalsView:
      type: object
      description: |
        Structured payload of an `arrivals` SSE frame (the `content` field
        is this object JSON-encoded). Built from `get_arrivals_tool`.
      required: [station, platforms]
      properties:
        station: { type: string }
        platforms:
          type: array
          items: { $ref: "#/components/schemas/ArrivalsPlatform" }

    Problem:
      type: object
      description: "RFC 7807 problem details."
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri }

  responses:
    Problem:
      description: Error response following RFC 7807.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
