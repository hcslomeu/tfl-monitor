version: 2

sources:
  # Static reference tables live in the `ref` schema. dbt only honours
  # `schema` at the source level (not per-table), so these need their own
  # source block. The `raw` Kafka-backed warehouse sources were removed in
  # ADR 014 (the app reads TfL live; nothing writes `raw.*` any more).
  - name: tfl_ref
    description: "External static reference tables (lines, stations) in the ref schema."
    database: "{{ env_var('POSTGRES_DB', 'tflmonitor') }}"
    schema: ref
    tables:
      - name: lines
        description: "Canonical list of TfL lines with display metadata."
        columns:
          - name: line_id
            tests:
              - not_null
              - unique
          - name: line_name
            tests:
              - not_null
          - name: mode
            tests:
              - not_null

      - name: stations
        description: "Canonical list of TfL stop points with coordinates."
        columns:
          - name: station_id
            tests:
              - not_null
              - unique
          - name: station_name
            tests:
              - not_null
