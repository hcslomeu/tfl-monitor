services:
  postgres:
    # pgvector image (postgres:16 + the `vector` extension binaries). The
    # RAG pgvector store runs CREATE EXTENSION IF NOT EXISTS vector on
    # first use, which the local superuser role can execute.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tflmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-tflmonitor}
      POSTGRES_INITDB_ARGS: "--auth=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./contracts/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tflmonitor} -d ${POSTGRES_DB:-tflmonitor}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redpanda-console:
    image: redpandadata/console:v2.7.2
    restart: unless-stopped
    profiles: ["ui"]
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  redpanda-init:
    image: redpandadata/redpanda:v24.2.7
    profiles: ["init"]
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for topic in line-status arrivals disruptions; do
          rc=0
          out=$$(rpk -X brokers=redpanda:9092 topic create $$topic \
            --partitions 1 --replicas 1 2>&1) || rc=$$?
          echo "$$out"
          if [ "$$rc" -ne 0 ] && ! echo "$$out" | grep -qi "already exists\|TOPIC_ALREADY_EXISTS"; then
            exit 1
          fi
        done

  tfl-line-status-producer:
    build:
      context: .
      dockerfile: src/ingestion/Dockerfile
    restart: unless-stopped
    profiles: ["ingest"]
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      TFL_APP_KEY: ${TFL_APP_KEY:?TFL_APP_KEY is required}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      APP_VERSION: ${APP_VERSION:-0.0.1}
    command: ["uv", "run", "python", "-m", "ingestion.producers.line_status"]

  tfl-line-status-consumer:
    build:
      context: .
      dockerfile: src/ingestion/Dockerfile
    restart: unless-stopped
    profiles: ["ingest"]
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DATABASE_URL: postgresql://${POSTGRES_USER:-tflmonitor}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-tflmonitor}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      APP_VERSION: ${APP_VERSION:-0.0.1}
    command: ["uv", "run", "python", "-m", "ingestion.consumers.line_status"]

  tfl-arrivals-producer:
    build:
      context: .
      dockerfile: src/ingestion/Dockerfile
    restart: unless-stopped
    profiles: ["ingest"]
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      TFL_APP_KEY: ${TFL_APP_KEY:?TFL_APP_KEY is required}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      APP_VERSION: ${APP_VERSION:-0.0.1}
    command: ["uv", "run", "python", "-m", "ingestion.producers.arrivals"]

  tfl-arrivals-consumer:
    build:
      context: .
      dockerfile: src/ingestion/Dockerfile
    restart: unless-stopped
    profiles: ["ingest"]
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DATABASE_URL: postgresql://${POSTGRES_USER:-tflmonitor}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-tflmonitor}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      APP_VERSION: ${APP_VERSION:-0.0.1}
    command: ["uv", "run", "python", "-m", "ingestion.consumers.arrivals"]

  tfl-disruptions-producer:
    build:
      context: .
      dockerfile: src/ingestion/Dockerfile
    restart: unless-stopped
    profiles: ["ingest"]
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      TFL_APP_KEY: ${TFL_APP_KEY:?TFL_APP_KEY is required}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      APP_VERSION: ${APP_VERSION:-0.0.1}
    command: ["uv", "run", "python", "-m", "ingestion.producers.disruptions"]

  tfl-disruptions-consumer:
    build:
      context: .
      dockerfile: src/ingestion/Dockerfile
    restart: unless-stopped
    profiles: ["ingest"]
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DATABASE_URL: postgresql://${POSTGRES_USER:-tflmonitor}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-tflmonitor}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      APP_VERSION: ${APP_VERSION:-0.0.1}
    command: ["uv", "run", "python", "-m", "ingestion.consumers.disruptions"]

  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
  redpanda-data:
  minio-data:
